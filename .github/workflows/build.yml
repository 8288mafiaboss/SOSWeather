name: Build SOS Weather

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: latest-stable

    - name: Install xcodegen
      run: brew install xcodegen

    - name: Create project.yml
      run: |
        cat > project.yml << 'EOF'
        name: SOSWeather
        options:
          bundleIdPrefix: com.sossoftware
          deploymentTarget:
            macOS: "13.0"
        targets:
          SOSWeather:
            type: application
            platform: macOS
            sources:
              - path: .
                excludes:
                  - "*.yml"
                  - ".github/**"
                  - "README.md"
            settings:
              base:
                PRODUCT_BUNDLE_IDENTIFIER: com.sossoftware.sosweather
                SWIFT_VERSION: 5.9
                MACOSX_DEPLOYMENT_TARGET: "13.0"
        EOF

    - name: Generate Xcode project
      run: xcodegen generate

    - name: Build app
      run: |
        xcodebuild \
          -project SOSWeather.xcodeproj \
          -scheme SOSWeather \
          -configuration Release \
          -destination 'platform=macOS,arch=arm64' \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO \
          build

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: SOS-Weather-App
        path: ~/Library/Developer/Xcode/DerivedData/**/Build/Products/Release/SOSWeather.app
